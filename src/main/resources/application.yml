server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: appestacionamento-be
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/appestacionamento?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: America/Sao_Paulo

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  sync:
    auth:
      header-name: ${SYNC_AUTH_HEADER_NAME:X-Sync-Token}
      token: ${SYNC_AUTH_TOKEN:pax-estac-2026-sync-84f2c91a-3bd7}
  release:
    version: ${APP_RELEASE_VERSION:1.0.7}
    url: ${APP_RELEASE_URL:https://desktop-vf1i427.tail1265aa.ts.net/releases/appestacionamento.apk}
    notes: ${APP_RELEASE_NOTES:Release 7 com ajustes recentes no cadastro de mensalistas, atalho direto para WhatsApp e consolidacao da distribuicao externa do app.}
    published-at: ${APP_RELEASE_PUBLISHED_AT:2026-05-07T11:15:00-03:00}
