server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: appestacionamento-be
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/appestacionamento?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: America/Sao_Paulo

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  sync:
    auth:
      header-name: ${SYNC_AUTH_HEADER_NAME:X-Sync-Token}
      token: ${SYNC_AUTH_TOKEN:pax-estac-2026-sync-84f2c91a-3bd7}
  release:
    version: ${APP_RELEASE_VERSION:1.0.14}
    url: ${APP_RELEASE_URL:https://github.com/EngAlexandreD/appestacionamento-be/releases/download/v1.0.14/appestacionamento.apk}
    notes: "${APP_RELEASE_NOTES:teste: atualizacao via app com permissao de instalacao corrigida}"
    published-at: ${APP_RELEASE_PUBLISHED_AT:2026-06-15T00:00:00-03:00}




